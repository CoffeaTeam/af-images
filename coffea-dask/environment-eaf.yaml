  - lz4
  - python-xxhash
  - zstandard
    # file formats
  - h5py
  - uproot>=5.6.2
    # misc.
  - pytables
  - python-rapidjson
  - geventhttpclient
  - brotli
  - correctionlib
  - python-graphviz
    # scikit-hep
