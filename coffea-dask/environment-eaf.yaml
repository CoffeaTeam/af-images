name: base
channels:
  - conda-forge
dependencies:
  # python version specified in Dockerfile
  #- gxx
  - voms # x509 proxy system
  - ca-policy-lcg # WLCG trusted CAs
  - xrootd
  - htcondor
  - curl
    # jupyter-related
  - jupyterlab
  - ipympl
  - dask_labextension
  - dask-gateway==2025.4.0
  - dask-jobqueue
  - dask<2025.4.0
  - dask-awkward
